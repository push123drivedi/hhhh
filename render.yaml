services:
  - type: web
    name: svms-duty-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false
      - key: CLIENT_URL
        fromService:
          type: web
          name: svms-duty-frontend
          property: url

  - type: web
    name: svms-duty-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://svms-duty-backend.onrender.com/api
      - key: VITE_SOCKET_URL
        value: https://svms-duty-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
